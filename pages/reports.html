<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Отчёты | Чуланчик</title>

    <base href="/Chulanchik/">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a3c2a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="icons/icon-192.png">

    <!-- Единый файл стилей -->
    <link rel="stylesheet" href="css/styles.css">

    <style>
        /* ============================================================
           Уникальные стили страницы отчётов
           Только то, что отсутствует в общих компонентах и макетах.
           ============================================================ */

        html {
            height: 100%;
            overflow: hidden;
            overscroll-behavior: none;
        }

        body {
            height: 100%;
            overflow: hidden;
            overscroll-behavior: none;
            touch-action: manipulation;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========== ЦВЕТОВЫЕ БЕЙДЖИ КАТЕГОРИЙ РАСХОДОВ ========== */
        .category-badge.rent { background: #e0e7ff; color: #4338ca; }
        .category-badge.advertising { background: #fce7f3; color: #be185d; }
        .category-badge.supplies { background: #d1fae5; color: #065f46; }
        .category-badge.utilities { background: #fed7aa; color: #9a3412; }
        .category-badge.salary { background: #e0e7ff; color: #3730a3; }
        .category-badge.taxes { background: #fecaca; color: #991b1b; }
        .category-badge.repair { background: #fef3c7; color: #92400e; }
        .category-badge.other { background: #f3f4f6; color: #374151; }

        /* ========== АДАПТИВНОСТЬ ========== */
        @media (max-width: 768px) {
            html {
                overflow: auto;
            }

            body {
                overflow: auto;
            }

            .reports-page {
                padding: var(--spacing-3);
            }

            .kpi-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .reports-header {
                flex-direction: column;
                align-items: stretch;
            }

            .period-selector {
                flex-wrap: wrap;
            }

            .expense-filters {
                flex-direction: column;
                align-items: stretch;
            }

            .filter-group {
                width: 100%;
            }

            .expenses-actions {
                flex-direction: column;
            }

            .expenses-actions button {
                width: 100%;
            }

            .expenses-summary {
                flex-direction: column;
            }
        }

        @media (max-width: 480px) {
            .kpi-grid {
                grid-template-columns: 1fr;
            }

            .reports-tabs {
                width: 100%;
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <main class="page-container">
            <div class="reports-page">
                <div class="reports-header">
                    <h1>Аналитика</h1>

                    <div class="period-selector">
                        <select id="periodSelect">
                            <option value="today">Сегодня</option>
                            <option value="yesterday">Вчера</option>
                            <option value="week" selected>Неделя</option>
                            <option value="month">Месяц</option>
                            <option value="quarter">Квартал</option>
                            <option value="year">Год</option>
                        </select>

                        <button class="btn-secondary btn-sm" id="refreshBtn">Обновить</button>
                        <button class="btn-secondary btn-sm" id="exportBtn">CSV Экспорт</button>
                        <button class="btn-primary btn-sm" id="exportPdfBtn">PDF Отчёт</button>
                    </div>
                </div>

                <div id="reportsContent"></div>
            </div>
        </main>
    </div>

    <div id="modalContainer"></div>
    <div id="notificationContainer"></div>

    <script type="module" src="controllers/ReportsController.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/Chulanchik/sw.js', { scope: '/Chulanchik/' })
                .catch(function() {});
        }
    </script>
</body>
</html>
