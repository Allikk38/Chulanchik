<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Отчёты | Чуланчик</title>

    <base href="/Chulanchik/">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icons/icon-192.png">

    <!-- Стили -->
    <link rel="stylesheet" href="css/styles.css">

    <style>
        html {
            height: 100%;
            overflow: hidden;
            overscroll-behavior: none;
        }

        body {
            height: 100%;
            overflow: hidden;
            overscroll-behavior: none;
            touch-action: manipulation;
        }

        .reports-page {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: var(--spacing-5);
            background: var(--color-bg);
        }

        .reports-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: var(--spacing-4);
            margin-bottom: var(--spacing-5);
        }

        .period-selector {
            display: flex;
            align-items: center;
            gap: var(--spacing-3);
        }

        .reports-tabs {
            display: flex;
            gap: var(--spacing-1);
            padding: var(--spacing-1);
            background: var(--color-white);
            border-radius: var(--radius-lg);
            border: var(--border-width) solid var(--color-border);
            width: fit-content;
            margin-bottom: var(--spacing-5);
        }

        .tab-btn {
            display: flex;
            align-items: center;
            gap: var(--spacing-2);
            padding: var(--spacing-2) var(--spacing-4);
            border-radius: var(--radius-md);
            font-weight: 500;
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
            background: transparent;
            border: none;
            cursor: pointer;
        }

        .tab-btn.active {
            background: var(--color-gray-800);
            color: white;
        }

        .reports-content-inner {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* KPI */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: var(--spacing-4);
            margin-bottom: var(--spacing-5);
        }

        .kpi-card {
            padding: var(--spacing-4);
            background: var(--color-white);
            border-radius: var(--radius-lg);
            border: var(--border-width) solid var(--color-border);
            border-left: 3px solid var(--color-primary);
        }

        .kpi-header {
            display: flex;
            align-items: center;
            gap: var(--spacing-2);
            margin-bottom: var(--spacing-2);
        }

        .kpi-icon {
            font-size: 18px;
            opacity: 0.6;
        }

        .kpi-title {
            font-size: var(--font-size-xs);
            color: var(--color-text-secondary);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: var(--letter-spacing-wide);
        }

        .kpi-value {
            font-size: var(--font-size-2xl);
            font-weight: 700;
            color: var(--color-text);
            font-family: var(--font-family-mono);
        }

        /* Карточки */
        .card {
            padding: var(--spacing-4);
            background: var(--color-white);
            border-radius: var(--radius-lg);
            border: var(--border-width) solid var(--color-border);
        }

        .card h4 {
            font-size: var(--font-size-sm);
            text-transform: uppercase;
            letter-spacing: var(--letter-spacing-wide);
            margin-bottom: var(--spacing-3);
            color: var(--color-text);
        }

        .charts-row {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: var(--spacing-5);
            margin-bottom: var(--spacing-5);
        }

        .chart-card {
            padding: var(--spacing-4);
            background: var(--color-white);
            border-radius: var(--radius-lg);
            border: var(--border-width) solid var(--color-border);
        }

        .chart-container {
            height: 220px;
            position: relative;
        }

        .dashboard-bottom {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-5);
            margin-bottom: var(--spacing-5);
        }

        .two-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-5);
        }

        /* Сводки */
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: var(--spacing-4);
            margin-bottom: var(--spacing-5);
        }

        .summary-card {
            padding: var(--spacing-3) var(--spacing-4);
            background: var(--color-white);
            border-radius: var(--radius-lg);
            border: var(--border-width) solid var(--color-border);
        }

        .summary-card .label {
            font-size: var(--font-size-xs);
            color: var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: var(--letter-spacing-wide);
        }

        .summary-card .value {
            font-size: var(--font-size-xl);
            font-weight: 700;
            font-family: var(--font-family-mono);
            color: var(--color-text);
        }

        /* Топ-товары */
        .top-product-item {
            display: flex;
            align-items: center;
            gap: var(--spacing-3);
            padding: var(--spacing-2) 0;
            border-bottom: var(--border-width) solid var(--color-border-light);
        }

        .top-product-item:last-child { border-bottom: none; }

        .top-product-item .rank {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--color-gray-100);
            border-radius: 50%;
            font-size: var(--font-size-xs);
            font-weight: 700;
            color: var(--color-text-secondary);
            flex-shrink: 0;
        }

        .top-product-item .name {
            flex: 1;
            font-weight: 500;
            font-size: var(--font-size-sm);
        }

        .top-product-item .value {
            font-size: var(--font-size-xs);
            color: var(--color-text-muted);
        }

        .top-product-item .revenue {
            min-width: 80px;
            text-align: right;
            font-weight: 600;
            font-family: var(--font-family-mono);
        }

        /* Залежавшиеся */
        .slow-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--spacing-2) 0;
            border-bottom: var(--border-width) solid var(--color-border-light);
        }

        .slow-item:last-child { border-bottom: none; }

        .slow-item .days {
            padding: 2px 8px;
            background: var(--color-warning-bg);
            color: var(--color-warning-dark);
            border-radius: var(--radius-full);
            font-size: var(--font-size-xs);
            font-weight: 500;
        }

        .slow-item .price {
            font-family: var(--font-family-mono);
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
        }

        /* Таблицы */
        .table-container {
            overflow-x: auto;
            border-radius: var(--radius-md);
            border: var(--border-width) solid var(--color-border);
            background: var(--color-white);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: var(--font-size-sm);
        }

        .data-table th {
            padding: var(--spacing-2) var(--spacing-3);
            font-size: var(--font-size-xs);
            text-transform: uppercase;
            color: var(--color-text-muted);
            background: var(--color-gray-50);
            text-align: left;
            border-bottom: var(--border-width) solid var(--color-border);
        }

        .data-table td {
            padding: var(--spacing-2) var(--spacing-3);
            border-bottom: var(--border-width) solid var(--color-border-light);
        }

        .money { font-family: var(--font-family-mono); font-weight: 500; text-align: right; }

        .status-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: var(--radius-full);
            font-size: var(--font-size-xs);
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-in_stock { background: var(--color-success-bg); color: var(--color-success-dark); }
        .status-sold { background: var(--color-danger-bg); color: var(--color-danger-dark); }

        .empty-message {
            padding: var(--spacing-4);
            text-align: center;
            color: var(--color-text-muted);
            font-size: var(--font-size-sm);
        }

        .text-success { color: var(--color-success-dark); }
        .text-danger { color: var(--color-danger-dark); }

        .reports-loader {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 300px;
            color: var(--color-text-muted);
        }

        @media (max-width: 1024px) {
            .charts-row { grid-template-columns: 1fr; }
            .dashboard-bottom { grid-template-columns: 1fr; }
            .two-columns { grid-template-columns: 1fr; }
        }

        @media (max-width: 768px) {
            html {
                overflow: auto;
            }
            body {
                overflow: auto;
            }
            .kpi-grid { grid-template-columns: repeat(2, 1fr); }
            .reports-header { flex-direction: column; align-items: stretch; }
            .period-selector { flex-wrap: wrap; }
        }

        @media (max-width: 480px) {
            .kpi-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="app-header">
            <h1>Отчёты | Чуланчик</h1>
            <nav class="app-nav">
                <a href="pages/inventory.html">Склад</a>
                <a href="pages/cashier.html">Касса</a>
                <a href="pages/reports.html" class="active" aria-current="page">Отчёты</a>
            </nav>
            <div class="header-actions">
                <span class="user-email" id="userEmail"></span>
                <button class="btn-ghost btn-sm" id="logoutBtn">Выход</button>
            </div>
        </header>

        <main class="page-container">
            <div class="reports-page">
                <div class="reports-header">
                    <h1>Аналитика</h1>

                    <div class="period-selector">
                        <select id="periodSelect">
                            <option value="today">Сегодня</option>
                            <option value="yesterday">Вчера</option>
                            <option value="week" selected>Неделя</option>
                            <option value="month">Месяц</option>
                            <option value="quarter">Квартал</option>
                            <option value="year">Год</option>
                        </select>

                        <button class="btn-secondary btn-sm" id="refreshBtn">Обновить</button>
                        <button class="btn-secondary btn-sm" id="exportBtn">CSV Экспорт</button>
                    </div>
                </div>

                <div id="reportsContent"></div>
            </div>
        </main>
    </div>

    <div id="modalContainer"></div>
    <div id="notificationContainer"></div>

    <script type="module" src="controllers/ReportsController.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/second-hand-crm/sw.js', { scope: '/second-hand-crm/' })
                .catch(() => {});
        }
    </script>
</body>
</html>
