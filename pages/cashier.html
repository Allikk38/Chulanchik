<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Касса | Чуланчик</title>

    <base href="/Chulanchik/">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a3c2a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icons/icon-192.png">

    <!-- Единый файл стилей -->
    <link rel="stylesheet" href="css/styles.css">

    <style>
        /* ============================================================
           Уникальные стили страницы кассы
           Только то, что отсутствует в общих компонентах и макетах.
           ============================================================ */

        /* Анимация спиннера (есть в компонентах, но определяется через JS) */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Active-состояния для тач-устройств (нет в buttons.css) */
        .product-card:active {
            background: var(--color-gray-50);
        }

        .btn-qty:active {
            background: var(--color-gray-200);
        }

        .btn-remove:active {
            background: var(--color-danger-bg);
            color: var(--color-danger);
        }

        .btn-checkout:active {
            background: var(--color-primary-dark);
        }

        /* ========== АДАПТИВНОСТЬ: МОБИЛЬНЫЕ (<= 768px) ========== */
        @media (max-width: 768px) {
            .cashier-page {
                padding: var(--spacing-2);
            }

            .cashier-layout {
                display: block;
                height: 100%;
                overflow: hidden;
                position: relative;
            }

            .cashier-layout.shift-closed-mode {
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .products-panel {
                height: 100%;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }

            .products-grid-container {
                flex: 1;
                min-height: 0;
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
                touch-action: pan-y;
            }

            .shift-bar {
                padding: var(--spacing-2) var(--spacing-3);
                gap: var(--spacing-2);
                flex-wrap: wrap;
            }

            .shift-stats {
                gap: var(--spacing-2);
            }

            .stat-item .stat-label {
                font-size: 9px;
            }

            .stat-item .stat-value {
                font-size: var(--font-size-xs);
            }

            .products-toolbar {
                gap: var(--spacing-1);
            }

            .toolbar-left {
                flex-wrap: wrap;
                gap: var(--spacing-1);
            }

            .search-wrapper {
                max-width: none;
                min-width: 120px;
            }

            .category-tab {
                padding: var(--spacing-1) var(--spacing-2-5);
                font-size: var(--font-size-xs);
                min-height: 32px;
            }

            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                gap: var(--spacing-2);
            }

            .product-photo {
                height: 100px;
            }

            .product-info {
                padding: var(--spacing-1-5) var(--spacing-2) var(--spacing-2);
            }

            .product-name {
                font-size: var(--font-size-xs);
            }

            .product-price {
                font-size: var(--font-size-sm);
            }

            #quickAddBtn {
                display: none;
            }

            /* Slide-in панель корзины */
            .cart-panel {
                position: fixed;
                top: 0;
                right: 0;
                width: 85vw;
                max-width: 400px;
                height: 100vh;
                height: 100dvh;
                z-index: var(--z-modal);
                transform: translateX(100%);
                transition: transform 150ms ease-out;
                box-shadow: var(--shadow-xl);
                border-radius: 0;
                border: none;
                border-left: var(--border-width) solid var(--color-border);
            }

            .cart-panel.open {
                transform: translateX(0);
            }

            .cart-toggle-btn {
                display: flex;
                position: fixed;
                bottom: var(--spacing-4);
                left: 50%;
                transform: translateX(-50%);
                z-index: var(--z-fixed);
                height: 48px;
                padding: 0 var(--spacing-6);
                background: var(--color-primary);
                color: var(--color-white);
                border: none;
                border-radius: var(--radius-full);
                font-size: var(--font-size-sm);
                font-weight: 600;
                cursor: pointer;
                box-shadow: var(--shadow-md);
                align-items: center;
                gap: var(--spacing-2);
                white-space: nowrap;
                -webkit-tap-highlight-color: transparent;
            }

            .cart-toggle-badge {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                min-width: 22px;
                height: 22px;
                padding: 0 var(--spacing-1);
                background: var(--color-white);
                color: var(--color-primary-dark);
                border-radius: var(--radius-full);
                font-size: var(--font-size-xs);
                font-weight: 700;
            }

            .cart-overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(15, 23, 42, 0.4);
                z-index: var(--z-modal-backdrop);
            }

            .btn-checkout {
                height: 48px;
                font-size: var(--font-size-base);
            }

            .btn-qty {
                width: 32px;
                height: 32px;
                font-size: 18px;
            }

            .btn-remove {
                width: 32px;
                height: 32px;
                font-size: 20px;
            }

            .keyboard-hints {
                display: none;
            }
        }

        /* ========== МАЛЕНЬКИЕ ТЕЛЕФОНЫ (<= 480px) ========== */
        @media (max-width: 480px) {
            .shift-bar {
                padding: var(--spacing-1-5) var(--spacing-2);
            }

            .shift-bar .btn-sm {
                font-size: 11px;
                padding: 0 var(--spacing-2);
                height: 28px;
            }

            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
                gap: var(--spacing-1-5);
            }

            .product-photo {
                height: 85px;
            }

            .cart-panel {
                width: 100vw;
                max-width: 100vw;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <main class="page-container">
            <div class="cashier-page">
                <div id="cashierContent"></div>
            </div>
        </main>
    </div>

    <div id="modalContainer"></div>
    <div id="notificationContainer"></div>

    <!-- FAB: быстрое добавление товара (видна только на мобильных) -->
    <button class="fab-add-product" id="fabQuickAdd" title="Быстрый товар" style="display: none;">+</button>

    <script type="module" src="controllers/CashierController.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/Chulanchik/sw.js', { scope: '/Chulanchik/' })
                .catch(function() {});
        }
    </script>
</body>
</html>
