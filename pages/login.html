<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | Чуланчик</title>

    <base href="/second-hand-crm/">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icons/icon-192.png">

    <!-- Стили -->
    <link rel="stylesheet" href="css/styles.css">

    <style>
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
            padding: 16px;
            background: var(--color-bg);
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: var(--color-white);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            border: var(--border-width) solid var(--color-border);
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-header h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--color-text);
            margin-bottom: 4px;
        }

        .login-header p {
            font-size: 14px;
            color: var(--color-text-secondary);
        }

        .offline-banner {
            display: none;
            padding: 12px;
            margin-bottom: 16px;
            background: var(--color-warning-bg);
            border-radius: var(--radius-md);
            color: var(--color-warning-dark);
            font-size: 14px;
            text-align: center;
            border-left: 3px solid var(--color-warning);
        }

        .offline-banner.show {
            display: block;
        }

        .form-error {
            display: none;
            padding: 10px 12px;
            margin-bottom: 16px;
            background: var(--color-danger-bg);
            border-radius: var(--radius-md);
            color: var(--color-danger-dark);
            font-size: 13px;
            border-left: 3px solid var(--color-danger);
        }

        .form-error.show {
            display: block;
        }

        .btn-login {
            width: 100%;
            height: 44px;
            margin-top: 8px;
            font-size: 15px;
            font-weight: 600;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-header">
                <h1>🧺 Чуланчик</h1>
                <p>Комиссионный магазин</p>
            </div>

            <div class="offline-banner" id="offlineBanner">
                ⚠️ Нет подключения к интернету
            </div>

            <div class="form-error" id="formError"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="user@example.com"
                        autocomplete="email" required>
                    <div class="field-error" id="emailError"></div>
                </div>

                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" placeholder="••••••••"
                        autocomplete="current-password" required>
                    <div class="field-error" id="passwordError"></div>
                </div>

                <button type="submit" class="btn-primary btn-login" id="loginBtn">
                    Войти
                </button>
            </form>
        </div>
    </div>

    <!-- Уведомления -->
    <div id="notificationContainer"></div>

    <script type="module" src="controllers/LoginController.js"></script>

    <!-- PWA -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/second-hand-crm/sw.js', { scope: '/second-hand-crm/' })
                .catch(() => {});
        }
    </script>
</body>
</html>
