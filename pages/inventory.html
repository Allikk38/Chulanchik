<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Склад | Чуланчик</title>

    <base href="/Chulanchik/">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a3c2a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icons/icon-192.png">

    <!-- Единый файл стилей -->
    <link rel="stylesheet" href="css/styles.css">

    <style>
        /* ============================================================
           Уникальные стили страницы склада
           Только то, что отсутствует в общих компонентах и макетах.
           ============================================================ */

        :root {
            --inventory-accent: #1a3c2a;
            --inventory-bg: #f5f2ed;
            --inventory-card: #ffffff;
            --inventory-text: #1e1a16;
            --inventory-text-secondary: #6b5e53;
            --inventory-text-muted: #8c7b6e;
            --inventory-border: #e0dbd3;
            --inventory-border-light: #f0ede8;
        }

        html {
            height: 100%;
            overflow: hidden;
            overscroll-behavior: none;
        }

        body {
            height: 100%;
            overflow: hidden;
            overscroll-behavior: none;
            touch-action: manipulation;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========== АДАПТИВНОСТЬ ========== */
        @media (max-width: 768px) {
            html {
                overflow: auto;
            }

            body {
                overflow: auto;
            }

            .inventory-page {
                padding: var(--spacing-3);
            }

            .filters-panel {
                flex-direction: column;
                align-items: stretch;
            }

            .stat-card-inline {
                min-width: 100px;
                padding: var(--spacing-3);
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <main class="page-container">
            <div class="inventory-page">
                <div class="filters-panel">
                    <div class="search-wrapper">
                        <input type="text" id="searchInput" placeholder="Поиск по названию или ID...">
                    </div>

                    <select id="statusFilter">
                        <option value="">Все статусы</option>
                        <option value="in_stock">В наличии</option>
                        <option value="sold">Продан</option>
                        <option value="reserved">Забронирован</option>
                    </select>

                    <select id="categoryFilter">
                        <option value="">Все категории</option>
                    </select>

                    <select id="sortSelect">
                        <option value="created_at-desc">Новые сначала</option>
                        <option value="price-asc">Цена: по возрастанию</option>
                        <option value="price-desc">Цена: по убыванию</option>
                        <option value="name-asc">Название: А-Я</option>
                    </select>

                    <!-- Переключатель таблица / карточки (виден только на мобильных) -->
                    <div class="view-toggle">
                        <button class="view-toggle-btn" id="viewToggleBtn" title="Показать таблицей">::</button>
                    </div>

                    <button class="btn-primary" id="addProductBtn">+ Добавить товар</button>
                    <button class="btn-secondary" id="refreshBtn">Обновить</button>
                </div>

                <div class="inventory-stats" id="statsBar"></div>

                <!-- Таблица (десктоп + мобильные при переключении) -->
                <div class="products-table-wrapper">
                    <table class="products-table">
                        <thead>
                            <tr>
                                <th width="36"><input type="checkbox" id="selectAllCheckbox"></th>
                                <th width="60">Фото</th>
                                <th>Название</th>
                                <th>Категория</th>
                                <th>Цена</th>
                                <th>Статус</th>
                                <th width="80">Действия</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>

                <!-- Карточки (мобильные по умолчанию) -->
                <div class="mobile-product-cards" id="mobileCardsContainer"></div>
            </div>
        </main>
    </div>

    <div id="modalContainer"></div>
    <div id="notificationContainer"></div>

    <script type="module" src="controllers/InventoryController.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/Chulanchik/sw.js', { scope: '/Chulanchik/' })
                .catch(function() {});
        }
    </script>
</body>
</html>
