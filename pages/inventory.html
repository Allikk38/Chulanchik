<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Склад | Чуланчик</title>

    <base href="/Chulanchik/">
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icons/icon-192.png">

    <!-- Стили -->
    <link rel="stylesheet" href="css/base/variables.css">
    <link rel="stylesheet" href="css/base/reset.css">
    <link rel="stylesheet" href="css/base/typography.css">
    <link rel="stylesheet" href="css/components/buttons.css">
    <link rel="stylesheet" href="css/components/forms.css">
    <link rel="stylesheet" href="css/components/tables.css">
    <link rel="stylesheet" href="css/components/modal.css">
    <link rel="stylesheet" href="css/components/notifications.css">
    <link rel="stylesheet" href="css/components/product-card.css">
    <link rel="stylesheet" href="css/components/cart.css">
    <link rel="stylesheet" href="css/layouts/app.css">
    <link rel="stylesheet" href="css/layouts/cashier.css">
    <link rel="stylesheet" href="css/layouts/inventory.css">
    <link rel="stylesheet" href="css/layouts/reports.css">
    <link rel="stylesheet" href="css/utils/utilities.css">
    <link rel="stylesheet" href="css/utils/responsive.css">

    <style>
        html {
            height: 100%;
            overflow: hidden;
            overscroll-behavior: none;
        }

        body {
            height: 100%;
            overflow: hidden;
            overscroll-behavior: none;
            touch-action: manipulation;
        }

        .inventory-page {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: var(--spacing-5);
            background: var(--color-bg);
        }

        .filters-panel {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: var(--spacing-4);
            margin-bottom: var(--spacing-5);
            padding: var(--spacing-3) var(--spacing-4);
            background: var(--color-white);
            border-radius: var(--radius-lg);
            border: var(--border-width) solid var(--color-border);
        }

        .search-wrapper {
            position: relative;
            max-width: 320px;
            width: 100%;
        }

        .search-wrapper input {
            padding-left: var(--spacing-8);
        }

        .search-wrapper::before {
            content: '>';
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            opacity: 0.4;
            pointer-events: none;
            font-weight: 600;
        }

        .inventory-stats {
            display: flex;
            gap: var(--spacing-4);
            margin-bottom: var(--spacing-5);
            flex-wrap: wrap;
        }

        .stat-card-inline {
            display: flex;
            align-items: center;
            gap: var(--spacing-4);
            padding: var(--spacing-4);
            background: var(--color-white);
            border-radius: var(--radius-lg);
            border: var(--border-width) solid var(--color-border);
            flex: 1;
            min-width: 140px;
        }

        .stat-icon {
            font-size: 24px;
            opacity: 0.6;
        }

        .stat-label {
            font-size: var(--font-size-xs);
            color: var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: var(--letter-spacing-wide);
        }

        .stat-value {
            font-size: var(--font-size-xl);
            font-weight: 700;
            color: var(--color-text);
        }

        .products-table-wrapper {
            background: var(--color-white);
            border-radius: var(--radius-lg);
            border: var(--border-width) solid var(--color-border);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .products-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 700px;
        }

        .products-table thead {
            background: var(--color-gray-50);
            border-bottom: var(--border-width) solid var(--color-border);
        }

        .products-table th {
            padding: var(--spacing-3) var(--spacing-4);
            font-size: var(--font-size-xs);
            font-weight: 600;
            color: var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: var(--letter-spacing-wide);
            text-align: left;
            white-space: nowrap;
        }

        .products-table td {
            padding: var(--spacing-3) var(--spacing-4);
            border-bottom: var(--border-width) solid var(--color-border-light);
            font-size: var(--font-size-sm);
            vertical-align: middle;
        }

        .products-table tbody tr:hover td {
            background: var(--color-gray-50);
        }

        .products-table tbody tr.selected td {
            background: var(--color-primary-bg);
        }

        .product-thumb {
            width: 44px;
            height: 44px;
            background: var(--color-gray-100);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: var(--border-width) solid var(--color-border-light);
        }

        .product-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .thumb-placeholder {
            font-size: 20px;
            opacity: 0.4;
            color: var(--color-text-muted);
        }

        .product-name { font-weight: 500; color: var(--color-text); }
        .product-id { font-size: var(--font-size-xs); color: var(--color-text-muted); }

        .price-main { font-weight: 600; font-family: var(--font-family-mono); }
        .price-cost { font-size: var(--font-size-xs); color: var(--color-text-muted); }

        .status-badge {
            display: inline-block;
            padding: var(--spacing-1) var(--spacing-3);
            border-radius: var(--radius-full);
            font-size: var(--font-size-xs);
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-in_stock { background: var(--color-success-bg); color: var(--color-success-dark); }
        .status-sold { background: var(--color-danger-bg); color: var(--color-danger-dark); }
        .status-reserved { background: var(--color-warning-bg); color: var(--color-warning-dark); }

        .row-actions {
            display: flex;
            gap: var(--spacing-1);
            justify-content: flex-end;
        }

        .loading-spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--color-border);
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 40px auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            html {
                overflow: auto;
            }
            body {
                overflow: auto;
            }
            .inventory-page { padding: var(--spacing-3); }
            .filters-panel { flex-direction: column; align-items: stretch; }
            .stat-card-inline { min-width: 100px; padding: var(--spacing-3); }
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="app-header">
            <h1>Склад | Чуланчик</h1>
            <nav class="app-nav">
                <a href="pages/inventory.html" class="active" aria-current="page">Склад</a>
                <a href="pages/cashier.html">Касса</a>
                <a href="pages/reports.html">Отчёты</a>
            </nav>
            <div class="header-actions">
                <span class="user-email" id="userEmail"></span>
                <button class="btn-ghost btn-sm" id="logoutBtn">Выход</button>
            </div>
        </header>

        <main class="page-container">
            <div class="inventory-page">
                <div class="filters-panel">
                    <div class="search-wrapper">
                        <input type="text" id="searchInput" placeholder="Поиск по названию или ID...">
                    </div>

                    <select id="statusFilter">
                        <option value="">Все статусы</option>
                        <option value="in_stock">В наличии</option>
                        <option value="sold">Продан</option>
                        <option value="reserved">Забронирован</option>
                    </select>

                    <select id="categoryFilter">
                        <option value="">Все категории</option>
                    </select>

                    <select id="sortSelect">
                        <option value="created_at-desc">Новые сначала</option>
                        <option value="price-asc">Цена: по возрастанию</option>
                        <option value="price-desc">Цена: по убыванию</option>
                        <option value="name-asc">Название: А-Я</option>
                    </select>

                    <button class="btn-primary" id="addProductBtn">+ Добавить товар</button>
                    <button class="btn-secondary" id="refreshBtn">Обновить</button>
                </div>

                <div class="inventory-stats" id="statsBar"></div>

                <div class="products-table-wrapper">
                    <table class="products-table">
                        <thead>
                            <tr>
                                <th width="36"><input type="checkbox" id="selectAllCheckbox"></th>
                                <th width="60">Фото</th>
                                <th>Название</th>
                                <th>Категория</th>
                                <th>Цена</th>
                                <th>Статус</th>
                                <th width="80">Действия</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="modalContainer"></div>
    <div id="notificationContainer"></div>

    <script type="module" src="controllers/InventoryController.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/Chulanchik/sw.js', { scope: '/Chulanchik/' })
                .catch(() => {});
        }
    </script>
</body>
</html>
